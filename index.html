<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airbnb Listings</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main class="container my-4">
      <h1>Airbnb Listings</h1>
      <p class="text-muted">First 50 San Francisco listings loaded with fetch.</p>

      <section class="mb-3">
        <input
          id="searchInput"
          class="form-control"
          type="text"
          placeholder="Search by listing name or host name"
        />
      </section>

      <p id="listingCount" class="small text-muted">Loading listings...</p>

      <section id="listings" class="row g-3"></section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
